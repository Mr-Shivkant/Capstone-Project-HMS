<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Reports</h2>
</div>
<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">✖</button>
    <h3>Menu</h3>
    <ul>
        <li onclick="go('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li onclick="go('availability.html')"><i class="fas fa-bed"></i> Check Availability</li>
        <li onclick="go('rooms.html')"><i class="fas fa-calendar-check"></i> Book Room</li>
        <li onclick="go('checkinout.html')"><i class="fas fa-key"></i> Check In/Out</li>
        <li onclick="go('staff.html')"><i class="fas fa-users"></i> Staff</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-bar"></i> Reports</li>
        <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">
    <div class="page-header">
        <div>
            <h2>Booking Reports</h2>
            <p>View booked rooms and access detailed booking records for printing.</p>
        </div>
    </div>

    <div class="report-card">
        <div class="report-controls">
            <div class="input-group">
                <label>Search bookings</label>
                <input id="reportSearch" type="text" placeholder="Search by guest or room" oninput="filterReports()">
            </div>
            <div class="header-actions">
                <button class="submit-btn secondary" onclick="exportReportExcel()">Export Excel</button>
                <button class="submit-btn secondary" onclick="exportReportPDF()">Export PDF</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Room</th>
                        <th>Guest</th>
                        <th>Status</th>
                        <th>Check-In</th>
                        <th>Check-Out</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    <tr><td colspan="6">Loading booked room reports...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
