<!DOCTYPE html>
<html>
<head>
    <title>Book Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Dashboard</h2>
</div>
<div class="sidebar">
    <h3>Menu</h3>
    <ul>
         <li onclick="go('dashboard.html')">🏠 Dashboard</li>
        <li onclick="go('availability.html')">🛏️ Check Availability</li>
        <li onclick="go('rooms.html')">🛏️ Rooms</li>
        <li onclick="go('checkinout.html')">🔑 Check In/Out</li>
        <li onclick="go('staff.html')">👨‍💼 Staff</li>
        <li onclick="go('reports.html')">📊 Reports</li>
        <li onclick="go('logout.html')">🚪 Logout</li>
    </ul>
</div>

<div class="main">

    <div class="form-card">
        <h2>🛎️ Book Room</h2>

        <div class="form-grid">

            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name" placeholder="Enter full name">
            </div>

            <div class="input-group">
                <label>ID Proof</label>
                <input type="text" id="id" placeholder="Aadhar / Passport">
            </div>

            <div class="input-group">
                <label>Address</label>
                <input type="text" id="address" placeholder="Enter address">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="Enter phone number">
            </div>

            <div class="input-group full-width">
                <label>Select Room</label>
                <select id="room">
                    <option value="">Choose Room</option>
                    <option value="101">Room 101</option>
                    <option value="102">Room 102</option>
                    <option value="104">Room 104</option>
                </select>
            </div>

        </div>

        <button class="submit-btn" onclick="bookRoom()">Confirm Booking</button>

        <div id="message" class="message"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
