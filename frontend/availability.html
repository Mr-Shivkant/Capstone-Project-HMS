<!DOCTYPE html>
<html>
<head>
    <title>Check Availability</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Dashboard</h2>
</div>
<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">✖</button>
    <h3>Menu</h3>
    <ul>
        <li onclick="go('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li onclick="go('availability.html')"><i class="fas fa-bed"></i> Check Availability</li>
        <li onclick="go('rooms.html')"><i class="fas fa-calendar-check"></i> Book Room</li>
        <li onclick="go('checkinout.html')"><i class="fas fa-key"></i> Check In/Out</li>
        <li onclick="go('staff.html')"><i class="fas fa-users"></i> Staff</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-bar"></i> Reports</li>
        <li onclick="go('logout.html')"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">

    <h2>Check Room Availability</h2>

    <!-- Filter Card -->
    <div class="filter-box">
        <h3><i class="fas fa-filter"></i> Filter Rooms</h3>

        <div class="filters">
            <select id="filterType" class="filter-control">
                <option value="">Room Type</option>
                <option value="AC">AC</option>
                <option value="Non-AC">Non-AC</option>
            </select>

            <select id="filterSeater" class="filter-control">
                <option value="">Seater</option>
                <option value="1">1 Seater</option>
                <option value="2">2 Seater</option>
                <option value="3">3 Seater</option>
                <option value="4">4 Seater</option>
            </select>

            <input type="text" id="filterRoomNo" class="filter-control" placeholder="Room No.">

            <button class="search-btn" onclick="filterRooms()"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <!-- Result Card -->
    <div class="result-box">
        <h3>Available Rooms</h3>
        <div id="roomList" class="room-list"></div>
    </div>
<!-- Booking Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeBooking()">✖</span>

        <h2>Room Booking</h2>

        <div id="stepContainer"></div>

        <div class="form-navigation">
            <button id="prevBtn" onclick="prevStep()">⬅ Previous</button>
            <button id="nextBtn" onclick="nextStep()">Next ➡</button>
        </div>
    </div>
</div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
