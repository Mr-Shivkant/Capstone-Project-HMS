<!DOCTYPE html>
<html>
<head>
    <title>Check Availability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Dashboard</h2>
</div>
<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">✖</button>
    <h3>Menu</h3>
    <ul>
        <li onclick="go('dashboard.html')">🏠 Dashboard</li>
        <li onclick="go('availability.html')">🛏️ Check Availability</li>
        <li onclick="go('rooms.html')">🛏️ Rooms</li>
        <li onclick="go('checkinout.html')">🔑 Check In/Out</li>
        <li onclick="go('staff.html')">👨‍💼 Staff</li>
        <li onclick="go('reports.html')">📊 Reports</li>
        <li onclick="go('logout.html')">🚪 Logout</li>
    </ul>
</div>

<div class="main">

    <h2>Check Room Availability</h2>

    <!-- Filter Card -->
    <div class="filter-box">
        <h3>🔍 Filter Rooms</h3>

        <div class="filters">
            <div class="input-group">
                <label>Room Type</label>
                <select id="type">
                    <option value="">Select Type</option>
                    <option value="AC">AC</option>
                    <option value="Non-AC">Non-AC</option>
                </select>
            </div>

            <div class="input-group">
                <label>Seater</label>
                <select id="seater">
                    <option value="">Select Seater</option>
                    <option value="1">1 Seater</option>
                    <option value="2">2 Seater</option>
                    <option value="3">3 Seater</option>
                    <option value="4">4 Seater</option>
                </select>
            </div>

            <button class="search-btn" onclick="filterRooms()">Search</button>
        </div>
    </div>

    <!-- Result Card -->
    <div class="result-box">
        <h3>📋 Available Rooms</h3>
        <div id="roomList" class="room-list"></div>
    </div>
<!-- Booking Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeBooking()">✖</span>

        <h2>Room Booking</h2>

        <div id="stepContainer"></div>

        <div class="form-navigation">
            <button id="prevBtn" onclick="prevStep()">⬅ Previous</button>
            <button id="nextBtn" onclick="nextStep()">Next ➡</button>
        </div>
    </div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
