<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Dashboard</h2>
</div>

<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">✖</button>

    <h3>Hotel Menu</h3>
    <ul>
         <li onclick="go('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li onclick="go('availability.html')"><i class="fas fa-bed"></i> Check Availability</li>
        <li onclick="go('rooms.html')"><i class="fas fa-calendar-check"></i> Book Room</li>
        <li onclick="go('checkinout.html')"><i class="fas fa-key"></i> Check In/Out</li>
        <li onclick="go('staff.html')"><i class="fas fa-users"></i> Staff</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-bar"></i> Reports</li>
        <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">
    <h2>Dashboard Overview</h2>

    <div class="cards">
        <div class="card" id="totalRooms"></div>
        <div class="card" id="availableRooms"></div>
        <div class="card" id="bookedRooms"></div>
        <div class="card" id="totalBookings"></div>
    </div>

    <div class="recent-bookings">
        <h3>Recent Bookings</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Room</th>
                        <th>Guest</th>
                        <th>Status</th>
                        <th>Cleaning</th>
                    </tr>
                </thead>
                <tbody id="recentBookingsBody">
                    <tr><td colspan="5">Loading recent bookings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
