<!DOCTYPE html>
<html>
<head>
    <title>Staff Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Staff Details</h2>
</div>
<div class="sidebar">
    <h3>Menu</h3>
    <ul>
        <li onclick="go('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li onclick="go('availability.html')"><i class="fas fa-bed"></i> Check Availability</li>
        <li onclick="go('rooms.html')"><i class="fas fa-calendar-check"></i> Book Room</li>
        <li onclick="go('checkinout.html')"><i class="fas fa-key"></i> Check In/Out</li>
        <li onclick="go('staff.html')"><i class="fas fa-users"></i> Staff</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-bar"></i> Reports</li>
        <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">
    <div class="staff-detail-container">
        <div class="page-header">
            <div>
                <h2>👨‍💼 Employee Details</h2>
                <p>Complete information about the staff member</p>
            </div>
            <button class="submit-btn primary" onclick="printStaffDetail()">🖨️ Print Details</button>
        </div>

        <div id="staffDetail" class="staff-detail-card">
            <div class="loading-state">
                <p>Loading staff details...</p>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadStaffDetail();
    });
</script>
</body>
</html>
