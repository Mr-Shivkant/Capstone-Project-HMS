<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
    <button id="menuToggle">☰</button>
    <h2>Staff Management</h2>
</div>
<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeBtn">✖</button>
    <h3>Menu</h3>
    <ul>
        <li onclick="go('dashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li onclick="go('availability.html')"><i class="fas fa-bed"></i> Check Availability</li>
        <li onclick="go('rooms.html')"><i class="fas fa-calendar-check"></i> Book Room</li>
        <li onclick="go('checkinout.html')"><i class="fas fa-key"></i> Check In/Out</li>
        <li onclick="go('staff.html')"><i class="fas fa-users"></i> Staff</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-bar"></i> Reports</li>
        <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">
    <div class="staff-container">
        <div class="page-header">
            <div>
                <h2>👨‍💼 Staff Directory</h2>
                <p>Manage your hotel staff members efficiently</p>
            </div>
            <div class="header-actions">
                <button class="submit-btn secondary" onclick="printStaffDetails()">🖨️ Print Staff</button>
                <button class="submit-btn secondary" onclick="exportStaffExcel()">📊 Export Excel</button>
                <button class="submit-btn primary" onclick="toggleStaffForm()">➕ Add Staff</button>
            </div>
        </div>

        <!-- Add Staff Form (Inline) -->
        <div id="staffFormContainer" class="staff-form-section" style="display:none;">
            <div class="form-card-professional">
                <h3>Add New Staff Member</h3>
                <form onsubmit="saveStaff(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Staff Name *</label>
                            <input id="staffName" type="text" placeholder="Full name" required>
                        </div>
                        <div class="form-group">
                            <label>Father Name</label>
                            <input id="staffFather" type="text" placeholder="Father's name">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input id="staffDob" type="date">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="staffGender">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Staff Type *</label>
                            <select id="staffType" required>
                                <option value="">Select Staff Type</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="Concierge">Concierge</option>
                                <option value="Night Auditor">Night Auditor</option>
                                <option value="Doorkeeper">Doorkeeper</option>
                                <option value="Executive Housekeeper">Executive Housekeeper</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>ID Type</label>
                            <input id="staffIdType" type="text" placeholder="Aadhar / Passport">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>ID Number</label>
                            <input id="staffIdNumber" type="text" placeholder="ID number">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="submit-btn primary" style="padding: 8px 16px; font-size: 13px; flex: 0.5;">💾 Save Staff</button>
                        <button type="button" class="submit-btn secondary" style="padding: 8px 16px; font-size: 13px; flex: 0.5;" onclick="toggleStaffForm()">✕ Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="staff-card">
            <div class="staff-grid">
                <div class="input-group">
                    <label>🔍 Search by name, role, or ID</label>
                    <input id="staffSearch" type="text" placeholder="Search staff..." oninput="filterStaff()">
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Father Name</th>
                            <th>DOB</th>
                            <th>Gender</th>
                            <th>Role</th>
                            <th>ID</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody">
                        <tr><td colspan="7">Loading staff data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
